name = "kufarresearch"
main = "worker.js"
compatibility_date = "2024-01-01"

# The single scheduler for this project. A GitHub Actions poller was tried
# instead of this earlier, but its `schedule` trigger never actually fired on
# its own (confirmed via the GitHub API — only ever one manual
# workflow_dispatch run, zero automatic runs). This Cron Trigger was
# previously removed because Kufar was blocking Cloudflare's cron IP pool
# with 403s, but that block isn't currently in effect (recent scheduled()
# runs got a real 200). If `scheduled blocked` errors show up again in
# Observability logs, that block is back — see STATUS.md for the history
# and what to try next.
[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "KUFAR_KV"
id = "8a39304eed8f4d44bda2f3c1edae581b"

[vars]
SEARCH_URL = "https://re.kufar.by/l/gomel/snyat/kvartiru?cur=USD&size=30"
MAX_SEEN_IDS = "800"

# Secrets (NOT stored here — set via `wrangler secret put`):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
