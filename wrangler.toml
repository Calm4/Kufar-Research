name = "kufarresearch"
main = "worker.js"
compatibility_date = "2024-01-01"

# Re-enabled after discovering the GitHub Actions poller's `schedule` trigger
# never actually fired on its own (checked via the GitHub API — only the one
# manual workflow_dispatch run existed, zero automatic runs after 30+ minutes).
# With no Cloudflare Cron Trigger either, nothing was polling in the
# background at all. Recent scheduled() runs (logged before this trigger was
# removed) got a real 200 from Kufar, so the earlier IP-pool block seems to
# not be in effect right now — running this in parallel with the GitHub
# Actions workflow gives two independent pollers instead of relying on one
# unproven scheduler. If Kufar starts blocking cron IPs again, look for
# `scheduled blocked` errors in Observability logs.
[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "KUFAR_KV"
id = "8a39304eed8f4d44bda2f3c1edae581b"

[vars]
SEARCH_URL = "https://re.kufar.by/l/gomel/snyat/kvartiru?cur=USD&size=30"
MAX_SEEN_IDS = "800"

# Secrets (NOT stored here — set via `wrangler secret put`):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
