name = "kufarresearch"
main = "worker.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true

[triggers]
crons = ["*/10 * * * *"]

[[kv_namespaces]]
binding = "KUFAR_KV"
id = "8a39304eed8f4d44bda2f3c1edae581b"

[vars]
SEARCH_URL = "https://re.kufar.by/l/gomel/snyat/kvartiru?cur=USD&size=30"
MAX_SEEN_IDS = "800"

# Secrets (NOT stored here — set via `wrangler secret put`):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
