name = "kufarresearch"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# No [triggers] here on purpose. Both Cloudflare Cron Trigger and the
# GitHub Actions `schedule` trigger were tried as the scheduler for this
# project and both turned out to have their own failure mode:
#   - GitHub Actions `schedule` never once fired automatically (confirmed
#     via the GitHub API — only a manual workflow_dispatch run existed).
#   - Cloudflare Cron Trigger runs from a distinct colo/IP pool that Kufar
#     has intermittently 403-blocked.
# The scheduler now lives entirely outside Cloudflare/GitHub: an external
# free service (cron-job.org or similar) hits this Worker's public URL on
# a schedule, indistinguishable from a normal visitor request. See
# STATUS.md for the full history and exact setup steps.

[observability]
enabled = true

[[kv_namespaces]]
binding = "KUFAR_KV"
id = "8a39304eed8f4d44bda2f3c1edae581b"

[vars]
SEARCH_URL = "https://re.kufar.by/l/gomel/snyat/kvartiru?cur=USD&size=30"
MAX_SEEN_IDS = "800"

# Secrets (NOT stored here — set via `wrangler secret put`):
#   TELEGRAM_BOT_TOKEN  — Telegram bot token
#   ADMIN_TOKEN         — required as ?token=... on every request (see
#                         src/index.ts) so random visitors with the URL
#                         can't trigger polls, read /status, or reset
#                         seen_ids. Pick any long random string. Also
#                         embedded in the Telegram webhook URL (see
#                         README.md) so Telegram's POSTs pass the same
#                         check as every other request.
#
# Who gets notified is no longer a fixed secret — anyone who messages
# /start to the bot is added to the "subscribers" list in KV (see
# src/subscribers.ts) and gets every subsequent new-listing broadcast.
